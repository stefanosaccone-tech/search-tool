<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue Search</title>
    
    <!-- CSS FIX: This forces Google's inner custom elements to stretch 100% wide -->
    <style>
        gen-search-widget, 
        .gen-search-widget-container,
        [id^="searchWidgetTrigger"] {
            width: 100% !important;
            max-width: 100% !important;
        }
        /* Target Google's internal shadow-root layouts if needed */
        ::part(results-container), ::part(search-container) {
            width: 100% !important;
            max-width: 100% !important;
        }
    </style>
</head>
<body style="margin: 0; padding: 20px; font-family: sans-serif; background-color: #f9f9f9;">

    <div style="width: 100%; max-width: 100%; margin: 0; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 850px; box-sizing: border-box;">
        
        <h2 style="margin-top: 0; color: #333;">📖 Catalogue Search</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Type your query below and press Enter.</p>

        <!-- Google Widget Script -->
        <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=en_US"></script>

        <!-- Search Input -->
        <input placeholder="Search here..." id="searchWidgetTrigger" 
               style="width: 100%; padding: 16px; font-size: 16px; border: 2px solid #1a73e8; border-radius: 4px; box-sizing: border-box; outline: none; margin-bottom: 20px;" />

        <!-- Search Widget (Carrying your active 'Include' filter) -->
        <gen-search-widget
          configId="a1c8f735-5881-4d81-ac20-26fa64158c68"
          triggerId="searchWidgetTrigger"
          displayMode="INLINE"
          searchFilter='structData.Include: ANY("x")'>
        </gen-search-widget>

    </div>

</body>
</html>
